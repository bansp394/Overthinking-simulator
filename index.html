<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overthinking Simulator</title>
<style>


  :root {
    --bg: #000;
    --fg: #fff;
    --accent: #fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    overflow: hidden;
    cursor: none;
  }

  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s;
    mix-blend-mode: difference;
  }
  #cursor.big { width: 40px; height: 40px; }

  #tunnel {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 0;
  }

  #thoughts-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .thought {
    position: absolute;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    pointer-events: none;
    white-space: nowrap;
    animation: floatThought linear forwards;
  }

  @keyframes floatThought {
    0%   { opacity: 0; transform: translate(0,0) rotate(var(--rot)); }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot2)); }
  }

  #stage {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .btn {
    position: absolute;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: clamp(18px, 3vw, 32px);
    letter-spacing: 0.12em;
    color: #000;
    background: #fff;
    border: none;
    padding: 14px 32px;
    cursor: none;
    user-select: none;
    white-space: nowrap;
    transition: transform 0.15s ease, opacity 0.3s ease, font-size 0.3s ease;
    z-index: 10;
  }
  .btn:hover { background: #fff; }
  .btn.doubt {
    font-size: clamp(11px, 1.8vw, 18px);
    padding: 10px 20px;
    background: #fff;
    color: #000;
    opacity: 0;
    animation: fadeInBtn 0.4s ease forwards;
  }
  .btn.ghost {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    font-size: clamp(10px, 1.4vw, 15px);
    padding: 8px 16px;
    opacity: 0;
    animation: fadeInBtn 0.4s ease forwards;
  }

  @keyframes fadeInBtn {
    from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
    to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }

  #stage-label {
    position: fixed;
    top: 28px; left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.7);
    z-index: 20;
    text-transform: uppercase;
    transition: opacity 0.5s;
  }

  #click-counter {
    position: fixed;
    bottom: 28px; right: 32px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.15);
    z-index: 20;
  }

  #collapse-msg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #collapse-msg.show { opacity: 1; }
  #collapse-msg h1 {
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    font-size: clamp(36px, 8vw, 96px);
    letter-spacing: 0.05em;
    line-height: 1;
    color: #fff;
  }
  #collapse-msg p {
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.9);
    margin-top: 20px;
    text-transform: uppercase;
  }

  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 50;
  }

  #vignette {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 3;
  }

  #flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 90;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="tunnel"></canvas>
<div id="thoughts-layer"></div>
<div id="vignette"></div>
<div id="stage"></div>
<div id="stage-label">— overthinking simulator —</div>
<div id="click-counter">attempts: 0</div>
<div id="collapse-msg">
  <h1>you're<br>overthinking<br>it.</h1>
  <p>click anywhere to try again</p>
</div>
<div id="scanlines"></div>
<div id="flash"></div>

<script>
const cursor = document.getElementById('cursor');
let mx = window.innerWidth/2, my = window.innerHeight/2;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

let attempts = 0;
let stage = 0;
let buttons = [];
let thoughtInterval = null;
let collapseTimer = null;

const stage_el   = document.getElementById('stage');
const counter_el = document.getElementById('click-counter');
const tunnel_el  = document.getElementById('tunnel');
const tunnel_ctx = tunnel_el.getContext('2d');
const thoughts_el= document.getElementById('thoughts-layer');
const collapse_el= document.getElementById('collapse-msg');
const flash_el   = document.getElementById('flash');

function resizeTunnel() {
  tunnel_el.width  = window.innerWidth;
  tunnel_el.height = window.innerHeight;
}
resizeTunnel();
window.addEventListener('resize', resizeTunnel);

const thoughtWords = [
  "what if","but why","not now","too late","maybe","wait",
  "are you sure?","what will they think","not ready","tomorrow",
  "what if it fails","too much","not enough","why bother",
  "do it","don't","later","never mind","just go","stay",
  "loop","again","stop","can't stop","think","overthink",
  "why","how","when","who","what","where","help","no","yes","maybe not",
];

const activeThoughtRects = [];

function spawnThought() {
  const word = thoughtWords[Math.floor(Math.random() * thoughtWords.length)];
  const sz   = 14 + Math.floor(Math.random() * 8);
  const charW = sz * 0.62;
  const w = word.length * charW + 16;
  const h = sz + 10;
  const margin = 20;

  let x, y, att = 0, placed = false;
  while (att < 12) {
    x = margin + Math.random() * (window.innerWidth  - w - margin*2);
    y = margin + Math.random() * (window.innerHeight - h - margin*2);
    const overlap = activeThoughtRects.some(r =>
      x < r.x + r.w + 24 && x + w + 24 > r.x &&
      y < r.y + r.h + 16 && y + h + 16 > r.y
    );
    if (!overlap) { placed = true; break; }
    att++;
  }
  if (!placed) return;

  const rect = { x, y, w, h };
  activeThoughtRects.push(rect);

  const el = document.createElement('div');
  el.className = 'thought';
  el.textContent = word;
  const dur = 3.5 + Math.random() * 3;
  const rot = (Math.random() - 0.5) * 12;
  el.style.cssText = `
    left:${x}px; top:${y}px;
    font-size:${sz}px;
    --rot:${rot}deg; --rot2:${rot}deg;
    --dx:0px; --dy:0px;
    animation-duration:${dur}s;
    color: rgba(255,255,255,${0.7 + Math.min(stage * 0.06, 0.25)});
    letter-spacing:0.08em;
  `;
  thoughts_el.appendChild(el);
  setTimeout(() => {
    el.remove();
    const idx = activeThoughtRects.indexOf(rect);
    if (idx > -1) activeThoughtRects.splice(idx, 1);
  }, dur * 1000);
}

function startThoughts(rate) {
  if (thoughtInterval) clearInterval(thoughtInterval);
  thoughtInterval = setInterval(spawnThought, rate);
}

let tunnelElapsed = 0;
let tunnelWord = 'WHY';
let tunnelActive = false;

function drawTunnelFrame(dt) {
  if (!tunnelActive) return;
  tunnelElapsed += dt;
  const W = tunnel_el.width, H = tunnel_el.height;
  const CX = W/2, CY = H/2;
  const S = Math.min(W, H);

  tunnel_ctx.fillStyle = '#000';
  tunnel_ctx.fillRect(0, 0, W, H);

  const N = 18;
  const rollOffset = tunnelElapsed * 50;

  function ringRect(norm) {
    const p = norm * norm * norm;
    const w = p * S * 0.99;
    const h = p * S * 0.97;
    return { x: CX-w/2, y: CY-h/2, x2: CX+w/2, y2: CY+h/2, w, h };
  }

  for (let i = N; i >= 1; i--) {
    const n0 = Math.min(i / N, 1.0);
    const n1 = Math.min((i-1) / N, 1.0);
    if (n0 <= 0.01 || n1 >= n0) continue;
    const ro = ringRect(n0);
    const ri = ringRect(n1);
    if (ro.w < 4 || ri.w < 0) continue;

    const bright = n0;
    const alpha = Math.max(0.3, Math.min(1, 0.4 + bright * 0.6));
    const v = Math.round(255 * Math.pow(bright, 0.5));
    const col = `rgba(${v},${v},${v},${alpha})`;
    const ringOffset = rollOffset * (i / N) * (i / N);

    const tH = ri.y - ro.y;
    const bH = ro.y2 - ri.y2;
    const lW = ri.x - ro.x;
    const rW = ro.x2 - ri.x2;
    const fz = Math.max(4, Math.min(tH, lW) * 0.85);

    function drawH(x, y, w, h, dir) {
      if (h < 2) return;
      tunnel_ctx.save();
      tunnel_ctx.beginPath(); tunnel_ctx.rect(x, y, w, h); tunnel_ctx.clip();
      tunnel_ctx.font = `900 ${fz}px Arial Black,sans-serif`;
      tunnel_ctx.fillStyle = col; tunnel_ctx.textBaseline = 'middle'; tunnel_ctx.textAlign = 'left';
      const wm = Math.max(1, tunnel_ctx.measureText(tunnelWord + ' ').width);
      const ty = y + h * 0.5;
      const off = dir > 0 ? ((ringOffset%wm)+wm)%wm : ((-ringOffset%wm)+wm)%wm;
      const sx = x + off - wm;
      for (let c = 0; sx + c*wm < x+w+wm; c++) tunnel_ctx.fillText(tunnelWord+' ', sx+c*wm, ty);
      tunnel_ctx.restore();
    }

    function drawV(x, y, w, h, dir) {
      if (w < 2) return;
      tunnel_ctx.save();
      tunnel_ctx.beginPath(); tunnel_ctx.rect(x, y, w, h); tunnel_ctx.clip();
      tunnel_ctx.font = `900 ${fz}px Arial Black,sans-serif`;
      tunnel_ctx.fillStyle = col; tunnel_ctx.textBaseline = 'middle'; tunnel_ctx.textAlign = 'left';
      const wm = Math.max(1, tunnel_ctx.measureText(tunnelWord + ' ').width);
      const tx = x + w * 0.5;
      const off = dir > 0 ? ((ringOffset%wm)+wm)%wm : ((-ringOffset%wm)+wm)%wm;
      const sy = y + off - wm;
      for (let r = 0; sy + r*wm < y+h+wm; r++) {
        tunnel_ctx.save();
        tunnel_ctx.translate(tx, sy + r*wm + wm*0.5);
        tunnel_ctx.rotate(dir > 0 ? Math.PI/2 : -Math.PI/2);
        tunnel_ctx.fillText(tunnelWord+' ', -wm*0.5, 0);
        tunnel_ctx.restore();
      }
      tunnel_ctx.restore();
    }

    drawH(ro.x, ro.y, ro.w, tH, +1);
    drawH(ro.x, ri.y2, ro.w, bH, -1);
    drawV(ro.x, ri.y, lW, ri.y2 - ri.y, -1);
    drawV(ri.x2, ri.y, rW, ri.y2 - ri.y, +1);
  }

  const glowR = S * 0.18;
  const grd = tunnel_ctx.createRadialGradient(CX,CY,0,CX,CY,glowR*2);
  grd.addColorStop(0,  'rgba(255,255,255,0.9)');
  grd.addColorStop(0.3,'rgba(255,255,255,0.15)');
  grd.addColorStop(1,  'rgba(0,0,0,0)');
  tunnel_ctx.fillStyle = grd;
  tunnel_ctx.beginPath(); tunnel_ctx.arc(CX,CY,glowR*2,0,Math.PI*2); tunnel_ctx.fill();
}

let lastTime = null;
function loop(now) {
  if (!lastTime) lastTime = now;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  drawTunnelFrame(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function makeBtn(text, x, y, onClick, type='main') {
  const btn = document.createElement('button');
  btn.className = 'btn' + (type==='doubt'?' doubt':type==='ghost'?' ghost':'');
  btn.textContent = text;
  btn.style.left = x + 'px';
  btn.style.top  = y + 'px';
  btn.style.transform = 'translate(-50%,-50%)';

  let dodgeCount = 0;
  const maxDodges = stage === 1 ? 3 : stage === 2 ? 1 : 0;

  btn.addEventListener('mouseenter', () => {
    cursor.classList.add('big');
    if (dodgeCount < maxDodges && type === 'main') {
      dodgeCount++;
      const angle = Math.random() * Math.PI * 2;
      const dist  = 80 + Math.random() * 120;
      let nx = x + Math.cos(angle) * dist;
      let ny = y + Math.sin(angle) * dist;
      nx = Math.max(80, Math.min(window.innerWidth  - 80, nx));
      ny = Math.max(60, Math.min(window.innerHeight - 60, ny));
      btn.style.left = nx + 'px';
      btn.style.top  = ny + 'px';
      x = nx; y = ny;
    }
  });

  btn.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    attempts++;
    counter_el.textContent = `attempts: ${attempts}`;
    onClick();
  });

  stage_el.appendChild(btn);
  buttons.push(btn);
  return btn;
}

function clearButtons() {
  buttons.forEach(b => b.remove());
  buttons = [];
}

function goStage0() {
  stage = 0;
  tunnelActive = false;
  tunnel_el.style.opacity = 0;
  clearButtons();
  startThoughts(4000);
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  makeBtn('JUST DO IT', cx, cy, goStage1, 'main');
}

function goStage1() {
  stage = 1;
  startThoughts(2500);
  clearButtons();
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  makeBtn('JUST DO IT', cx, cy, goStage2, 'main');
  spawnBigThought('maybe not now...', cx - 160, cy + 80);
}

function goStage2() {
  stage = 2;
  startThoughts(1500);
  clearButtons();
  flashScreen(80);
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  makeBtn('DO IT', cx - 120, cy, goStage3, 'main');
  setTimeout(() => {
    makeBtn('but wait...', cx + 130, cy, goStage3, 'doubt');
  }, 300);
  spawnBigThought('are you sure?', cx - 80, cy - 90);
}

function goStage3() {
  stage = 3;
  startThoughts(700);
  clearButtons();
  flashScreen(60);
  tunnelWord = 'WHY';
  tunnelActive = true;
  tunnel_el.style.opacity = 0.15;
  tunnel_el.style.transition = 'opacity 1.5s ease';

  const positions = [
    ['DO IT',          0.35, 0.35],
    ['but what if...',  0.60, 0.30],
    ["are you sure?",   0.35, 0.65],
    ['not yet',         0.62, 0.65],
    ['why though?',     0.20, 0.50],
    ['just go',         0.78, 0.50],
  ];

  positions.forEach(([text, px, py], i) => {
    setTimeout(() => {
      const x = px * window.innerWidth;
      const y = py * window.innerHeight;
      const type = i % 3 === 0 ? 'main' : i % 3 === 1 ? 'doubt' : 'ghost';
      makeBtn(text, x, y, goStage4, type);
    }, i * 200);
  });

  spawnBigThought('what will they think?', window.innerWidth*0.5 - 100, window.innerHeight*0.15);
}

function goStage4() {
  stage = 4;
  startThoughts(300);
  clearButtons();
  flashScreen(80);
  tunnel_el.style.opacity = 0.45;

  const chaosTexts = [
    'DO IT',"DON'T",'WAIT','GO','STOP','WHY','HOW','WHEN',
    'maybe','not now','just go','stay','too late','too soon',
    'what if','but why','help','no','yes','never mind',
    'DO IT',"DON'T DO IT",'JUST—','actually—','wait—',
  ];

  chaosTexts.forEach((text, i) => {
    setTimeout(() => {
      if (stage !== 4) return;
      const x = 60 + Math.random() * (window.innerWidth  - 120);
      const y = 60 + Math.random() * (window.innerHeight - 120);
      const type = Math.random() > 0.5 ? 'doubt' : 'ghost';
      makeBtn(text, x, y, goCollapse, type);
    }, i * 120);
  });

  collapseTimer = setTimeout(goCollapse, 5500);
}

function goCollapse() {
  if (collapseTimer) clearTimeout(collapseTimer);
  stage = 5;
  if (thoughtInterval) clearInterval(thoughtInterval);
  flashScreen(200);
  setTimeout(() => {
    clearButtons();
    tunnel_el.style.opacity = 0;
    tunnel_el.style.transition = 'opacity 0.8s ease';
    tunnelActive = false;
  }, 150);
  setTimeout(() => {
    collapse_el.classList.add('show');
  }, 400);
  document.addEventListener('click', resetGame, { once: true });
}

function resetGame() {
  collapse_el.classList.remove('show');
  thoughts_el.innerHTML = '';
  attempts = 0;
  counter_el.textContent = 'attempts: 0';
  setTimeout(goStage0, 600);
}

function flashScreen(dur) {
  flash_el.style.transition = 'none';
  flash_el.style.opacity = '0.9';
  setTimeout(() => {
    flash_el.style.transition = `opacity ${dur*2}ms ease`;
    flash_el.style.opacity = '0';
  }, dur);
}

function spawnBigThought(text, x, y) {
  const el = document.createElement('div');
  el.style.cssText = `
    position:absolute;
    left:${x}px; top:${y}px;
    font-family:'Helvetica Neue', Helvetica, sans-serif;
    font-size:15px;
    color:rgba(255,255,255,0.85);
    pointer-events:none;
    letter-spacing:0.1em;
    animation: fadeInOut 3s ease forwards;
    z-index:5;
  `;
  el.textContent = text;
  const style = document.createElement('style');
  style.textContent = `@keyframes fadeInOut {
    0%{opacity:0;transform:translateY(8px)}
    20%{opacity:1;transform:translateY(0)}
    80%{opacity:0.7}
    100%{opacity:0;transform:translateY(-12px)}
  }`;
  document.head.appendChild(style);
  stage_el.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

goStage0();
</script>
</body>
</html>
